name: Build & Sign Android (Eternal Pipeline)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      # ── فك تشفير المفتاح الثابت من الأسرار ──
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/mihrab-release.jks

      # ── إعداد التوقيع الثابت ──
      - name: Configure Stable Signing
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          GRADLE_FILE="android/app/build.gradle"
          python3 -c "
          import os, re
          content = open('$GRADLE_FILE').read()
          signing_config = \"\"\"
              signingConfigs {
                  release {
                      storeFile file('mihrab-release.jks')
                      storePassword '$KS_PASS'
                      keyAlias '$KEY_ALIAS'
                      keyPassword '$KEY_PASS'
                  }
              }
          \"\"\"
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          content = content.replace('buildTypes {', 'buildTypes {\\n        release {\\n            signingConfig signingConfigs.release\\n        }')
          
          # رفع رقم الإصدار تلقائياً
          run_number = os.getenv('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_number}', content)
          
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          "

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
