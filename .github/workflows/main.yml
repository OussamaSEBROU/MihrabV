name: Build & Sign Mihrab (Permanent Key + Assets Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      # ── الجزي الخاص بالأيقونات والسمات البصرية ──
      - name: Generate Mobile Assets (Icons & Splash)
        run: |
          # إضافة Capacitor Android إذا لم يكن موجوداً
          npx cap add android || true
          
          # تثبيت وتوليد الأيقونات من ملفاتك الأصلية
          npm install @capacitor/assets --save-dev
          
          # استبدال الأيقونات الافتراضية بأيقونات "المحراب"
          # يفترض هذا الأمر وجود ملف icon.png في المجلد الرئيسي أو مجلد assets
          npx capacitor-assets generate --android || echo "Icon generation skipped (using defaults if icon.png not found)"
          
          # مزامنة التغييرات
          npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/mihrab-release.jks

      - name: Configure Gradle Signing & Versioning
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          GRADLE_FILE="android/app/build.gradle"
          python3 -c "
          import os, re
          content = open('$GRADLE_FILE').read()
          
          signing_config = \"\"\"
              signingConfigs {
                  release {
                      storeFile file('mihrab-release.jks')
                      storePassword '$KS_PASS'
                      keyAlias '$KEY_ALIAS'
                      keyPassword '$KEY_PASS'
                  }
              }
          \"\"\"
          
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          
          content = content.replace('buildTypes {', 'buildTypes {\\n        release {\\n            signingConfig signingConfigs.release\\n        }')
          
          # رفع رقم الإصدار تلقائياً بناءً على رقم العملية (إضافة 100 لضمان تجاوز الإصدارات السابقة)
          run_number = int(os.getenv('GITHUB_RUN_NUMBER', '1')) + 100
          content = re.sub(r'versionCode \d+', f'versionCode {run_number}', content)
          
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          "

      - name: Build Signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-final-release
          path: android/app/build/outputs/apk/release/app-release.apk
